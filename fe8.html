        function generateCharacter() {
            const route = document.getElementById("routeSelect").value;

            let actualRoute = route;
            let routeText = "";
            const unpromotedOnly =
                document.getElementById("unpromotedOnly").checked;
            const excludeSeth =
                document.getElementById("excludeSeth").checked;
            

            if (route === "randoRoute") {
                actualRoute = Math.random() < 0.5 ? "eirikaRoute" : "ephraimRoute";
                routeText =
                    actualRoute === "eirikaRoute"
                        ? "Randomized Route: Eirika"
                        : "Randomized Route: Ephraim";
            }


            // shuffle array using the Fisher-Yates method.
            let pool = [...sacredStonesAll];


// Where all the filters should be going: Below this.
            if (unpromotedOnly) {
                pool = pool.filter(
                    unit => unit.promotions !== "None"
                );
            }
            
            if (excludeSeth) {
                pool = pool.filter(
                    unit => unit.name !== "Seth"
                );
            }
            
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

           
             // take 10 unique characters
            let selected = pool.slice(0, 10);

            if (actualRoute === "ephraimRoute") {
                selected.sort((a, b) => a.ephraimOrder - b.ephraimOrder);
            } else {
                selected.sort((a, b) => a.eirikaOrder - b.eirikaOrder);
            }

            const output = selected.map(unit => {
                let chapter;

                if (actualRoute === "eirikaRoute") {
                    chapter = unit.recruitmentEirika;
                } else if (actualRoute === "ephraimRoute") {
                    chapter = unit.recruitmentEphraim;
                } else {
                    chapter =
                        unit.recruitmentEirika !== unit.recruitmentEphraim
                            ? `${unit.recruitmentEirika} (Eirika) / ${unit.recruitmentEphraim} (Ephraim)`
                            : unit.recruitmentEirika;
                }

                const randomizePromotions =
                document.getElementById("randoPromotions").checked;

                let displayedClass = unit.startingClass;

                if (randomizePromotions) {
                    if (Array.isArray(unit.promotions) && unit.promotions.length > 0) {
                        displayedClass =
                            unit.promotions[Math.floor(Math.random() * unit.promotions.length)];
                    }
                }

                const displayName = randomizePromotions
                    ? `${unit.name} (${displayedClass})`
                    : unit.name;

                return `
                    <strong>${displayName}</strong><br>
                    - Recruited In: ${chapter}<br>
                    - Starting Class: ${unit.startingClass}<br><br>
                `;
            }).join("");

            document.getElementById("result").innerHTML = `
                ${routeText ? `<strong>${routeText}</strong><br><br>` : ""}
                ${output}
            `;
        }

        function generatePools() {
          const tags = [
            "SwordPool", "SwordPoolRec",
            "AxePool", "AxePoolRec",
            "LancePool", "LancePoolRec",
            "BowPool", "BowPoolRec",
            "AnimaPool", "AnimaPoolRec",
            "LightPool", "LightPoolRec",
            "DarkPool", "DarkPoolRec",
            "StaffPool", "StaffPoolRec"
          ];

          const output = document.getElementById("result");
          output.innerHTML = ""; // removes all prior output

          tags.forEach(tag => {
            const header = document.createElement("h3");
            header.textContent = tag;
            output.appendChild(header);

            sacredStonesAll.forEach(char => {
              if (char.tags && char.tags.includes(tag)) {
                const line = document.createElement("div");
                line.textContent = char.name;
                output.appendChild(line);
              }
            });
          });
        }
